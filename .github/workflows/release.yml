name: Upload OpenVPN DMG to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG
        run: |
          curl -L -o openvpn-connect.dmg \
          https://openvpn.net/downloads/openvpn-connect-v3-macos.dmg

      - name: Upload asset using GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            openvpn-connect.dmg \
            --clobber
